services:
  # 1. Local Redis cache instance
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # 2. Spring Boot replica instance 1
  springboot-backend-1:
    build: ./springboot-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://redis:6379
      - WORKER_ID=0  # Unique worker ID for Snowflake
    env_file:
      - .env
    depends_on:
      - redis

  # 3. Spring Boot replica instance 2 (Internal port 3000, mapped to external 3001)
  springboot-backend-2:
    build: ./springboot-backend
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://redis:6379
      - WORKER_ID=1  # Unique worker ID for Snowflake
    env_file:
      - .env
    depends_on:
      - redis

  # 4. React Frontend container (using original code context)
  frontend:
    build: ./Frontend
    ports:
      - "5173:80"
    depends_on:
      - springboot-backend-1
      - springboot-backend-2

  # 5. Nginx load balancer reverse proxy mount pointing to our custom configuration
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - springboot-backend-1
      - springboot-backend-2
      - frontend
